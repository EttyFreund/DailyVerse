<div class="actions-log-container">
  <h2> Tracking user actions</h2>
  
  <button mat-raised-button color="primary" (click)="toggleSort()">
    <mat-icon>sort</mat-icon>
     Sort by Date ({{ currentSortOrder === 'asc' ? 'Ascending' : 'Descending' }})
  </button>

  <table mat-table [dataSource]="(logs$ | async) ?? []" class="mat-elevation-z4">
    
    <ng-container matColumnDef="timestamp">
      <th mat-header-cell *matHeaderCellDef>Date and time </th>
      <td mat-cell *matCellDef="let log">{{ log.timestamp | date:'dd/MM/yyyy HH:mm:ss' }}</td>
    </ng-container>

    <ng-container matColumnDef="actionName">
      <th mat-header-cell *matHeaderCellDef>action</th>
      <td mat-cell *matCellDef="let log">{{ log.actionName }}</td>
    </ng-container>

    <ng-container matColumnDef="productName">
      <th mat-header-cell *matHeaderCellDef>product</th>
      <td mat-cell *matCellDef="let log">{{ log.productName || '-' }}</td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>
</div>
